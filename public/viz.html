<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Scion · Visualizer</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --bg:     #0e1014;
      --panel:  rgba(22,26,34,.80);
      --border: #2a313d;
      --fg:     #e6e9ef;
      --muted:  #8a93a3;
      --accent: #4cc9f0;
      --ok:     #06d6a0;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg); }
    canvas#viz { display: block; width: 100%; height: 100%; }

    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; gap: 12px; padding: 8px 16px;
      background: var(--panel); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
      font: 13px/1.4 -apple-system, "Segoe UI", system-ui, sans-serif;
      color: var(--fg);
    }
    header h1 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: .3px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted);
      flex-shrink: 0; transition: background .4s; }
    .dot.live { background: var(--ok); }
    .conn-label { font-size: 12px; color: var(--muted); }
    .conn-label.live { color: var(--ok); }

    .pill { display: inline-flex; align-items: center; gap: 5px; font-size: 12px;
      padding: 3px 8px; border-radius: 999px; background: rgba(30,36,46,.75);
      color: var(--muted); border: 1px solid var(--border); }

    select, .btn {
      background: rgba(30,36,46,.75); border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px; padding: 4px 10px;
      font-size: 13px; cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center;
    }
    select:hover, .btn:hover { color: var(--fg); border-color: var(--muted); }
    .spacer { flex: 1; }

    /* Live data readout overlay (bottom-left) */
    #dataReadout {
      position: fixed; bottom: 14px; left: 16px; z-index: 10;
      display: grid; grid-template-columns: repeat(3, auto auto 52px);
      gap: 6px 14px; align-items: center;
      font: 11px/1.4 "SF Mono", "Fira Code", monospace;
      color: var(--muted);
      pointer-events: none;
      opacity: 0.7;
    }
    #dataReadout .field { color: var(--fg); }
    #dataReadout .val   { text-align: right; font-variant-numeric: tabular-nums; }
    #dataReadout .spark { width: 52px; height: 14px; display: block; }

    /* ── Admin / threshold panel ─────────────────────────────────────────── */
    #adminPanel {
      position: fixed; top: 45px; right: 0; z-index: 20;
      width: 230px;
      background: rgba(18,22,30,.95);
      border: 1px solid var(--border); border-right: none;
      border-radius: 10px 0 0 10px;
      padding: 16px;
      font: 12px/1.5 -apple-system, "Segoe UI", system-ui, sans-serif;
      color: var(--fg);
      backdrop-filter: blur(12px);
      transform: translateX(100%);
      transition: transform .22s cubic-bezier(.4,0,.2,1);
    }
    #adminPanel.open { transform: translateX(0); }

    .ap-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--muted); font-weight: 700; margin-bottom: 14px;
    }
    .ap-row { margin-bottom: 12px; }
    .ap-row:last-child { margin-bottom: 0; }
    .ap-label {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 11px; color: var(--muted); margin-bottom: 5px;
    }
    .ap-label code {
      font-family: "SF Mono","Fira Code",monospace;
      font-size: 11px; color: var(--accent);
    }
    .ap-select {
      width: 100%; padding: 5px 8px;
      background: #1a1f29; border: 1px solid var(--border);
      color: var(--fg); border-radius: 6px; font-size: 12px;
    }
    .ap-range {
      width: 100%; accent-color: var(--accent); cursor: pointer;
      margin-top: 2px;
    }
    /* live value bar */
    .ap-bar-wrap {
      position: relative; height: 5px;
      background: #1a1f29; border-radius: 3px;
      margin: 6px 0 4px; overflow: visible;
    }
    .ap-bar-fill {
      position: absolute; left: 0; top: 0; height: 100%;
      background: var(--accent); border-radius: 3px;
      transition: width .15s linear, background .3s;
      max-width: 100%;
    }
    .ap-bar-fill.over  { background: var(--ok); }
    .ap-bar-thresh {
      position: absolute; top: -4px; width: 2px; height: 13px;
      background: #ef476f; border-radius: 1px; pointer-events: none;
    }
    .ap-current {
      font-family: "SF Mono","Fira Code",monospace;
      font-size: 11px; color: var(--muted);
      transition: color .3s;
    }
    .ap-current.over { color: var(--ok); }
    .ap-divider {
      border: none; border-top: 1px solid var(--border);
      margin: 12px 0;
    }
    .ap-btn {
      width: 100%; padding: 7px;
      background: #1a1f29; border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px;
      font-size: 12px; cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .ap-btn:hover { color: var(--fg); border-color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>Scion · Visualizer</h1>
    <span class="dot" id="connDot"></span>
    <span class="conn-label" id="connLabel">connecting…</span>
    <select id="vizPicker">
      <option value="organic">Organic Growth</option>
      <option value="sacred">Sacred Geometry</option>
    </select>
    <span class="spacer"></span>
    <button id="adminBtn" class="btn" style="display:none" title="Threshold settings">⚙ Threshold</button>
    <a href="/" class="btn">← Chart</a>
  </header>

  <!-- Threshold admin panel (sacred geometry viz only) -->
  <div id="adminPanel">
    <div class="ap-title">Spiral Settings</div>

    <div class="ap-row">
      <div class="ap-label"><span>Watch field</span></div>
      <select class="ap-select" id="apField">
        <option value="mean" selected>mean</option>
        <option value="min">min</option>
        <option value="max">max</option>
        <option value="delta">delta</option>
        <option value="variance">variance</option>
        <option value="deviation">deviation</option>
      </select>
    </div>

    <div class="ap-row">
      <div class="ap-label">
        <span>Sensitivity</span>
        <code id="apValDisplay">0.02</code>
      </div>
      <input type="range" class="ap-range" id="apRange" min="0.001" max="0.5" step="0.001" value="0.02">
    </div>

    <div class="ap-row">
      <div class="ap-label">
        <span>Change / frame</span>
        <span class="ap-current" id="apCurrent">—</span>
      </div>
      <div class="ap-bar-wrap">
        <div class="ap-bar-fill" id="apBarFill"></div>
        <div class="ap-bar-thresh" id="apBarThresh"></div>
      </div>
    </div>

    <hr class="ap-divider">

    <div class="ap-row">
      <div class="ap-label"><span>Spark field</span></div>
      <select class="ap-select" id="apSpark">
        <option value="deviation" selected>deviation</option>
        <option value="variance">variance</option>
        <option value="delta">delta</option>
        <option value="mean">mean</option>
      </select>
    </div>

    <div class="ap-row">
      <button class="ap-btn" id="apReset">Clear trail &amp; reset</button>
    </div>
  </div>

  <canvas id="viz"></canvas>

  <div id="dataReadout">
    <span class="field">min</span>   <span class="val" id="dr-min">—</span>       <canvas class="spark" id="sp-min"></canvas>
    <span class="field">max</span>   <span class="val" id="dr-max">—</span>       <canvas class="spark" id="sp-max"></canvas>
    <span class="field">mean</span>  <span class="val" id="dr-mean">—</span>      <canvas class="spark" id="sp-mean"></canvas>
    <span class="field">delta</span> <span class="val" id="dr-delta">—</span>     <canvas class="spark" id="sp-delta"></canvas>
    <span class="field">var</span>   <span class="val" id="dr-variance">—</span>  <canvas class="spark" id="sp-variance"></canvas>
    <span class="field">dev</span>   <span class="val" id="dr-deviation">—</span> <canvas class="spark" id="sp-deviation"></canvas>
  </div>

  <script src="/js/viz-engine.js"></script>
  <script src="/js/visualizers/organic-growth.js"></script>
  <script src="/js/visualizers/sacred-spiral.js"></script>
  <script>
    // ── Boot ──────────────────────────────────────────────────────────────
    const canvas    = document.getElementById('viz');
    const engine    = new VizEngine(canvas);
    const sacredViz = new SacredSpiralVisualizer();

    engine.register('organic', new OrganicGrowthVisualizer());
    engine.register('sacred',  sacredViz);
    engine.activate('organic');

    const adminBtn   = document.getElementById('adminBtn');
    const adminPanel = document.getElementById('adminPanel');

    function setViz(name) {
      engine.activate(name);
      const isSacred = name === 'sacred';
      adminBtn.style.display = isSacred ? '' : 'none';
      if (!isSacred) adminPanel.classList.remove('open');
    }

    document.getElementById('vizPicker').addEventListener('change', (e) => {
      setViz(e.target.value);
    });

    adminBtn.addEventListener('click', () => adminPanel.classList.toggle('open'));

    // ── Admin panel wiring ────────────────────────────────────────────────
    const apField      = document.getElementById('apField');
    const apRange      = document.getElementById('apRange');
    const apValDisplay = document.getElementById('apValDisplay');
    const apCurrent    = document.getElementById('apCurrent');
    const apBarFill    = document.getElementById('apBarFill');
    const apBarThresh  = document.getElementById('apBarThresh');
    const apSpark      = document.getElementById('apSpark');
    const apReset      = document.getElementById('apReset');

    apField.addEventListener('change', () => {
      sacredViz.watchField = apField.value;
    });

    apRange.addEventListener('input', () => {
      const v = parseFloat(apRange.value);
      apValDisplay.textContent = v.toFixed(3);
      sacredViz.sensitivity = v;
    });

    apSpark.addEventListener('change', () => {
      sacredViz.sparkField = apSpark.value;
    });

    apReset.addEventListener('click', () => sacredViz.clearTrail());

    // Live indicator: shows per-frame change magnitude vs sensitivity
    setInterval(() => {
      const change = sacredViz._changeMag || 0;
      const sens   = sacredViz.sensitivity;
      const over   = change > sens;
      // Scale bar so sensitivity tick sits at ~40% width; change can overflow it
      const barMax   = Math.max(sens * 2.5, change, 0.001);
      const fillPct  = Math.min(change / barMax * 100, 100);
      const sensPct  = Math.min(sens   / barMax * 100, 100);

      apCurrent.textContent = change.toFixed(4);
      apCurrent.classList.toggle('over', over);
      apBarFill.style.width  = fillPct + '%';
      apBarFill.classList.toggle('over', over);
      apBarThresh.style.left = sensPct + '%';
    }, 100);

    engine.onConnectionChange = (live) => {
      document.getElementById('connDot').classList.toggle('live', live);
      document.getElementById('connLabel').classList.toggle('live', live);
      document.getElementById('connLabel').textContent = live ? 'live' : 'reconnecting…';
    };

    // ── Data readout (ticks ~4×/s, reads from engine.state.smooth) ────────
    function fmt(v) {
      if (v === null || v === undefined) return '—';
      const a = Math.abs(v);
      if (a >= 1000 || (a > 0 && a < 0.001)) return v.toExponential(2);
      return v.toFixed(3);
    }

    // ── Sparklines ────────────────────────────────────────────────────────
    // The engine's shared-head ring buffer interleaves fields, so we keep our
    // own evenly-sampled per-field history here (60 pts @ 250 ms ≈ 15 s window).
    const FIELDS  = ['min', 'max', 'mean', 'delta', 'variance', 'deviation'];
    const COLORS  = {
      min: '#4cc9f0', max: '#f72585', mean: '#ffd166',
      delta: '#06d6a0', variance: '#b388ff', deviation: '#ff8c42',
    };
    const SPARK_LEN = 60;
    const sparkHist = Object.fromEntries(FIELDS.map(f => [f, []]));
    const sparkCtx  = {};

    const dpr = window.devicePixelRatio || 1;
    for (const f of FIELDS) {
      const c = document.getElementById('sp-' + f);
      c.width  = Math.round(c.clientWidth  * dpr);
      c.height = Math.round(c.clientHeight * dpr);
      const cx = c.getContext('2d');
      cx.scale(dpr, dpr);
      sparkCtx[f] = { cx, w: c.clientWidth, h: c.clientHeight };
    }

    function drawSpark(field) {
      const { cx, w, h } = sparkCtx[field];
      const data = sparkHist[field];
      cx.clearRect(0, 0, w, h);
      if (data.length < 2) return;

      let lo = Infinity, hi = -Infinity;
      for (const v of data) { if (v < lo) lo = v; if (v > hi) hi = v; }
      const span = hi - lo || 1;
      const pad  = 1.5;                       // keep the stroke off the edges
      const innerH = h - pad * 2;
      const x = i => (i / (data.length - 1)) * w;
      const y = v => pad + innerH - ((v - lo) / span) * innerH;

      // Soft area fill under the line.
      cx.beginPath();
      cx.moveTo(x(0), h);
      for (let i = 0; i < data.length; i++) cx.lineTo(x(i), y(data[i]));
      cx.lineTo(x(data.length - 1), h);
      cx.closePath();
      cx.fillStyle = COLORS[field] + '22';
      cx.fill();

      // Line.
      cx.beginPath();
      for (let i = 0; i < data.length; i++) {
        const px = x(i), py = y(data[i]);
        i === 0 ? cx.moveTo(px, py) : cx.lineTo(px, py);
      }
      cx.strokeStyle = COLORS[field];
      cx.lineWidth = 1;
      cx.lineJoin = cx.lineCap = 'round';
      cx.stroke();

      // Dot at the latest sample.
      cx.beginPath();
      cx.arc(x(data.length - 1), y(data[data.length - 1]), 1.5, 0, Math.PI * 2);
      cx.fillStyle = COLORS[field];
      cx.fill();
    }

    setInterval(() => {
      const s = engine.state.smooth;
      for (const f of FIELDS) {
        document.getElementById('dr-' + f).textContent = fmt(s[f]);
        const v = s[f];
        if (typeof v === 'number' && Number.isFinite(v)) {
          const hist = sparkHist[f];
          hist.push(v);
          if (hist.length > SPARK_LEN) hist.shift();
        }
        drawSpark(f);
      }
    }, 250);
  </script>
</body>
</html>
