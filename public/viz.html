<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Scion · Visualizer</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --bg:     #0e1014;
      --panel:  rgba(22,26,34,.80);
      --border: #2a313d;
      --fg:     #e6e9ef;
      --muted:  #8a93a3;
      --accent: #4cc9f0;
      --ok:     #06d6a0;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg); }
    canvas#viz { display: block; width: 100%; height: 100%; }

    /* Sidebar toggle — always on screen */
    #sidebarToggle {
      position: fixed; top: 12px; left: 12px; z-index: 30;
      width: 34px; height: 34px;
      background: rgba(14,16,20,.88); border: 1px solid var(--border);
      color: var(--muted); border-radius: 8px; cursor: pointer;
      font-size: 17px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
      transition: color .15s, border-color .15s;
    }
    #sidebarToggle:hover { color: var(--fg); border-color: var(--muted); }

    /* Sidebar */
    #sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; z-index: 20;
      width: 240px;
      background: rgba(14,16,20,.97);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(12px);
      display: flex; flex-direction: column;
      transform: translateX(-100%);
      transition: transform .22s cubic-bezier(.4,0,.2,1);
      overflow-y: auto;
      padding-top: 58px;
      font: 12px/1.5 -apple-system,"Segoe UI",system-ui,sans-serif;
      color: var(--fg);
    }
    #sidebar.open { transform: translateX(0); }

    .sb-header { padding: 12px 16px 14px; border-bottom: 1px solid var(--border); }
    .sb-title  { font-size: 14px; font-weight: 600; letter-spacing: .3px; margin-bottom: 6px; }
    .sb-conn   { display: flex; align-items: center; gap: 7px; }
    .sb-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .sb-section:last-child { border-bottom: none; }
    .sb-label  {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--muted); font-weight: 700; margin-bottom: 8px;
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted);
      flex-shrink: 0; transition: background .4s; }
    .dot.live { background: var(--ok); }
    .conn-label { font-size: 12px; color: var(--muted); }
    .conn-label.live { color: var(--ok); }

    /* Live data readout overlay (bottom-right) */
    #readoutWrap {
      position: fixed; bottom: 14px; right: 16px; z-index: 10;
      display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
    }
    #readoutToggle {
      background: rgba(14,16,20,.80); border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px; padding: 2px 8px;
      font: 11px/1.6 -apple-system,"Segoe UI",system-ui,sans-serif;
      cursor: pointer; backdrop-filter: blur(6px);
      transition: color .15s, border-color .15s;
    }
    #readoutToggle:hover { color: var(--fg); border-color: var(--muted); }
    #dataReadout {
      display: grid; grid-template-columns: repeat(3, auto auto 52px);
      gap: 6px 14px; align-items: center;
      font: 11px/1.4 "SF Mono", "Fira Code", monospace;
      color: var(--muted);
      pointer-events: none;
      opacity: 0.7;
    }
    #dataReadout .field { color: var(--fg); }
    #dataReadout .val   { text-align: right; font-variant-numeric: tabular-nums; }
    #dataReadout .spark { width: 52px; height: 14px; display: block; }

    /* ── Sacred settings section (lives inside sidebar) ─────────────────── */

    .ap-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--muted); font-weight: 700; margin-bottom: 14px;
    }
    .ap-row { margin-bottom: 12px; }
    .ap-row:last-child { margin-bottom: 0; }
    .ap-label {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 11px; color: var(--muted); margin-bottom: 5px;
    }
    .ap-label code {
      font-family: "SF Mono","Fira Code",monospace;
      font-size: 11px; color: var(--accent);
    }
    .ap-select {
      width: 100%; padding: 5px 8px;
      background: #1a1f29; border: 1px solid var(--border);
      color: var(--fg); border-radius: 6px; font-size: 12px;
    }
    .ap-range {
      width: 100%; accent-color: var(--accent); cursor: pointer;
      margin-top: 2px;
    }
    /* live value bar */
    .ap-bar-wrap {
      position: relative; height: 5px;
      background: #1a1f29; border-radius: 3px;
      margin: 6px 0 4px; overflow: visible;
    }
    .ap-bar-fill {
      position: absolute; left: 0; top: 0; height: 100%;
      background: var(--accent); border-radius: 3px;
      transition: width .15s linear, background .3s;
      max-width: 100%;
    }
    .ap-bar-fill.over  { background: var(--ok); }
    .ap-bar-thresh {
      position: absolute; top: -4px; width: 2px; height: 13px;
      background: #ef476f; border-radius: 1px; pointer-events: none;
    }
    .ap-current {
      font-family: "SF Mono","Fira Code",monospace;
      font-size: 11px; color: var(--muted);
      transition: color .3s;
    }
    .ap-current.over { color: var(--ok); }
    .ap-divider {
      border: none; border-top: 1px solid var(--border);
      margin: 12px 0;
    }
    .ap-btn {
      width: 100%; padding: 7px;
      background: #1a1f29; border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px;
      font-size: 12px; cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .ap-btn:hover { color: var(--fg); border-color: var(--muted); }
  </style>
</head>
<body>
  <!-- Always-visible sidebar toggle -->
  <button id="sidebarToggle" title="Toggle sidebar">☰</button>

  <!-- Sidebar -->
  <nav id="sidebar">

    <div class="sb-header">
      <div class="sb-title">Scion · Visualizer</div>
      <div class="sb-conn">
        <span class="dot" id="connDot"></span>
        <span class="conn-label" id="connLabel">connecting…</span>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Visualizer</div>
      <select id="vizPicker" class="ap-select">
        <option value="organic" hidden>Organic Growth</option>
        <option value="sacred" selected>Spiral</option>
      </select>
    </div>

    <!-- Sacred geometry settings — shown only when that viz is active -->
    <div id="sacredSettings">
      <div class="sb-section">
        <div class="sb-label">Motion</div>
        <div class="ap-row">
          <div class="ap-label"><span>Watch field</span></div>
          <select class="ap-select" id="apField">
            <option value="mean">mean</option>
            <option value="min">min</option>
            <option value="max">max</option>
            <option value="delta">delta</option>
            <option value="variance" selected>variance</option>
            <option value="deviation">deviation</option>
          </select>
        </div>
        <div class="ap-row">
          <div class="ap-label">
            <span>Sensitivity</span>
            <code id="apValDisplay">0.30</code>
          </div>
          <input type="range" class="ap-range" id="apRange" min="0" max="1" step="0.01" value="0.3">
        </div>
        <div class="ap-row">
          <div class="ap-label">
            <span>Change / frame</span>
            <span class="ap-current" id="apCurrent">—</span>
          </div>
          <div class="ap-bar-wrap">
            <div class="ap-bar-fill" id="apBarFill"></div>
            <div class="ap-bar-thresh" id="apBarThresh"></div>
          </div>
        </div>
      </div>

      <div class="sb-section">
        <div class="sb-label">Appearance</div>
        <div class="ap-row">
          <div class="ap-label"><span>Palette</span></div>
          <select class="ap-select" id="apPalette">
            <option value="aurora"          >Aurora  — teal › violet</option>
            <option value="fire"           >Fire    — red › gold</option>
            <option value="ocean"          >Ocean   — cyan › indigo</option>
            <option value="solar"          >Solar   — amber › lime</option>
            <option value="void"           >Void    — indigo › rose</option>
            <option value="prism"  selected  >Prism   — full spectrum</option>
          </select>
        </div>
        <div class="ap-row" style="display:flex;align-items:center;gap:8px">
          <input type="checkbox" id="apShowRings" style="accent-color:var(--accent);width:14px;height:14px;cursor:pointer;flex-shrink:0">
          <label for="apShowRings" style="font-size:11px;color:var(--muted);cursor:pointer">Show rings</label>
        </div>
        <div class="ap-row">
          <div class="ap-label"><span>Spark style</span></div>
          <select class="ap-select" id="apSparkStyle">
            <option value="lines"          >Lines</option>
            <option value="points" selected>Points</option>
          </select>
        </div>
        <div class="ap-row">
          <div class="ap-label">
            <span>Spark scale</span>
            <code id="apSparkScaleDisplay">1.0</code>
          </div>
          <input type="range" class="ap-range" id="apSparkScale" min="0.1" max="20" step="0.1" value="1">
        </div>
        <div class="ap-row">
          <div class="ap-label"><span>Spark field</span></div>
          <select class="ap-select" id="apSpark">
            <option value="deviation" selected>deviation</option>
            <option value="variance">variance</option>
            <option value="delta">delta</option>
            <option value="mean">mean</option>
          </select>
        </div>
        <div class="ap-row">
          <button class="ap-btn" id="apReset">Clear trail &amp; reset</button>
        </div>
      </div>
    </div>

    <div class="sb-section">
      <a href="/" class="ap-btn" style="text-align:center;text-decoration:none;display:block">← Back to Chart</a>
    </div>

  </nav>

  <canvas id="viz"></canvas>

  <div id="readoutWrap">
    <button id="readoutToggle">data ▾</button>
    <div id="dataReadout">
      <span class="field">min</span>   <span class="val" id="dr-min">—</span>       <canvas class="spark" id="sp-min"></canvas>
      <span class="field">max</span>   <span class="val" id="dr-max">—</span>       <canvas class="spark" id="sp-max"></canvas>
      <span class="field">mean</span>  <span class="val" id="dr-mean">—</span>      <canvas class="spark" id="sp-mean"></canvas>
      <span class="field">delta</span> <span class="val" id="dr-delta">—</span>     <canvas class="spark" id="sp-delta"></canvas>
      <span class="field">var</span>   <span class="val" id="dr-variance">—</span>  <canvas class="spark" id="sp-variance"></canvas>
      <span class="field">dev</span>   <span class="val" id="dr-deviation">—</span> <canvas class="spark" id="sp-deviation"></canvas>
    </div>
  </div>

  <script src="/js/viz-engine.js"></script>
  <script src="/js/visualizers/organic-growth.js"></script>
  <script src="/js/visualizers/sacred-spiral.js"></script>
  <script>
    // ── Boot ──────────────────────────────────────────────────────────────
    const canvas    = document.getElementById('viz');
    const engine    = new VizEngine(canvas);
    const sacredViz = new SacredSpiralVisualizer();

    engine.register('organic', new OrganicGrowthVisualizer());
    engine.register('sacred',  sacredViz);
    engine.activate('sacred');

    const sidebar        = document.getElementById('sidebar');
    const sacredSettings = document.getElementById('sacredSettings');

    document.getElementById('sidebarToggle').addEventListener('click', () => {
      sidebar.classList.toggle('open');
    });

    function setViz(name) {
      engine.activate(name);
      sacredSettings.style.display = name === 'sacred' ? '' : 'none';
    }

    document.getElementById('vizPicker').addEventListener('change', (e) => {
      setViz(e.target.value);
    });

    // ── Admin panel wiring ────────────────────────────────────────────────
    const apField             = document.getElementById('apField');
    const apRange             = document.getElementById('apRange');
    const apValDisplay        = document.getElementById('apValDisplay');
    const apCurrent           = document.getElementById('apCurrent');
    const apBarFill           = document.getElementById('apBarFill');
    const apBarThresh         = document.getElementById('apBarThresh');
    const apPalette           = document.getElementById('apPalette');
    const apSparkStyle        = document.getElementById('apSparkStyle');
    const apShowRings         = document.getElementById('apShowRings');
    const apSpark             = document.getElementById('apSpark');
    const apSparkScale        = document.getElementById('apSparkScale');
    const apSparkScaleDisplay = document.getElementById('apSparkScaleDisplay');
    const apReset             = document.getElementById('apReset');

    const SACRED_LS_KEY = 'scion-sacred-settings-v2'; // v2: sensitivity is now 0-1 normalised

    function saveSacredSettings() {
      try {
        localStorage.setItem(SACRED_LS_KEY, JSON.stringify({
          watchField:  sacredViz.watchField,
          sensitivity: sacredViz.sensitivity,
          sparkField:  sacredViz.sparkField,
          sparkScale:  sacredViz.sparkScale,
          palette:     sacredViz.palette,
          sparkStyle:  sacredViz.sparkStyle,
          showRings:   sacredViz.showRings,
        }));
      } catch (_) {}
    }

    function loadSacredSettings() {
      let saved = {};
      try { saved = JSON.parse(localStorage.getItem(SACRED_LS_KEY)) || {}; } catch (_) {}

      if (saved.watchField  != null) { apField.value      = saved.watchField;  sacredViz.watchField  = saved.watchField;  }
      if (saved.sensitivity != null) { apRange.value      = saved.sensitivity; sacredViz.sensitivity = saved.sensitivity; }
      if (saved.sparkField  != null) { apSpark.value      = saved.sparkField;  sacredViz.sparkField  = saved.sparkField;  }
      if (saved.sparkScale  != null) { apSparkScale.value = saved.sparkScale;  sacredViz.sparkScale  = saved.sparkScale;  }
      if (saved.palette     != null) { apPalette.value     = saved.palette;     sacredViz.palette     = saved.palette;     }
      if (saved.sparkStyle  != null) { apSparkStyle.value  = saved.sparkStyle;  sacredViz.sparkStyle  = saved.sparkStyle;  }
      if (saved.showRings   != null) { apShowRings.checked = saved.showRings;   sacredViz.showRings   = saved.showRings;   }

      // Sync display labels to whatever values ended up applied
      apValDisplay.textContent        = sacredViz.sensitivity.toFixed(4);
      apSparkScaleDisplay.textContent = sacredViz.sparkScale.toFixed(1);
    }

    loadSacredSettings();

    apField.addEventListener('change', () => {
      sacredViz.watchField = apField.value;
      saveSacredSettings();
    });

    apRange.addEventListener('input', () => {
      const v = parseFloat(apRange.value);
      apValDisplay.textContent = v.toFixed(2);
      sacredViz.sensitivity = v;
      saveSacredSettings();
    });

    apPalette.addEventListener('change', () => {
      sacredViz.palette = apPalette.value;
      saveSacredSettings();
    });

    apSparkStyle.addEventListener('change', () => {
      sacredViz.sparkStyle = apSparkStyle.value;
      saveSacredSettings();
    });

    apShowRings.addEventListener('change', () => {
      sacredViz.showRings = apShowRings.checked;
      saveSacredSettings();
    });

    apSparkScale.addEventListener('input', () => {
      const v = parseFloat(apSparkScale.value);
      apSparkScaleDisplay.textContent = v.toFixed(1);
      sacredViz.sparkScale = v;
      saveSacredSettings();
    });

    apSpark.addEventListener('change', () => {
      sacredViz.sparkField = apSpark.value;
      saveSacredSettings();
    });

    apReset.addEventListener('click', () => sacredViz.clearTrail());

    // Live indicator: shows normalised change (0-1) vs sensitivity threshold
    setInterval(() => {
      const norm = sacredViz._normChange || 0;
      const sens = sacredViz.sensitivity;
      const over = norm > sens;

      if (apPalette.value !== sacredViz.palette) apPalette.value = sacredViz.palette;
      apCurrent.textContent = norm.toFixed(2);
      apCurrent.classList.toggle('over', over);
      apBarFill.style.width  = Math.min(norm * 100, 100) + '%';
      apBarFill.classList.toggle('over', over);
      apBarThresh.style.left = Math.min(sens * 100, 100) + '%';
    }, 100);

    engine.onConnectionChange = (live) => {
      document.getElementById('connDot').classList.toggle('live', live);
      document.getElementById('connLabel').classList.toggle('live', live);
      document.getElementById('connLabel').textContent = live ? 'live' : 'reconnecting…';
    };

    // ── Data readout toggle ───────────────────────────────────────────────
    const readoutToggle = document.getElementById('readoutToggle');
    const dataReadout   = document.getElementById('dataReadout');
    let readoutVisible  = localStorage.getItem('scion-readout-visible') !== 'false';

    function applyReadoutVisibility() {
      dataReadout.style.display   = readoutVisible ? '' : 'none';
      readoutToggle.textContent   = readoutVisible ? 'data ▾' : 'data ▸';
    }
    applyReadoutVisibility();

    readoutToggle.addEventListener('click', () => {
      readoutVisible = !readoutVisible;
      localStorage.setItem('scion-readout-visible', readoutVisible);
      applyReadoutVisibility();
    });

    // ── Data readout (ticks ~4×/s, reads from engine.state.smooth) ────────
    function fmt(v) {
      if (v === null || v === undefined) return '—';
      const a = Math.abs(v);
      if (a >= 1000 || (a > 0 && a < 0.001)) return v.toExponential(2);
      return v.toFixed(3);
    }

    // ── Sparklines ────────────────────────────────────────────────────────
    // The engine's shared-head ring buffer interleaves fields, so we keep our
    // own evenly-sampled per-field history here (60 pts @ 250 ms ≈ 15 s window).
    const FIELDS  = ['min', 'max', 'mean', 'delta', 'variance', 'deviation'];
    const COLORS  = {
      min: '#4cc9f0', max: '#f72585', mean: '#ffd166',
      delta: '#06d6a0', variance: '#b388ff', deviation: '#ff8c42',
    };
    const SPARK_LEN = 60;
    const sparkHist = Object.fromEntries(FIELDS.map(f => [f, []]));
    const sparkCtx  = {};

    const dpr = window.devicePixelRatio || 1;
    for (const f of FIELDS) {
      const c = document.getElementById('sp-' + f);
      c.width  = Math.round(c.clientWidth  * dpr);
      c.height = Math.round(c.clientHeight * dpr);
      const cx = c.getContext('2d');
      cx.scale(dpr, dpr);
      sparkCtx[f] = { cx, w: c.clientWidth, h: c.clientHeight };
    }

    function drawSpark(field) {
      const { cx, w, h } = sparkCtx[field];
      const data = sparkHist[field];
      cx.clearRect(0, 0, w, h);
      if (data.length < 2) return;

      let lo = Infinity, hi = -Infinity;
      for (const v of data) { if (v < lo) lo = v; if (v > hi) hi = v; }
      const span = hi - lo || 1;
      const pad  = 1.5;                       // keep the stroke off the edges
      const innerH = h - pad * 2;
      const x = i => (i / (data.length - 1)) * w;
      const y = v => pad + innerH - ((v - lo) / span) * innerH;

      // Soft area fill under the line.
      cx.beginPath();
      cx.moveTo(x(0), h);
      for (let i = 0; i < data.length; i++) cx.lineTo(x(i), y(data[i]));
      cx.lineTo(x(data.length - 1), h);
      cx.closePath();
      cx.fillStyle = COLORS[field] + '22';
      cx.fill();

      // Line.
      cx.beginPath();
      for (let i = 0; i < data.length; i++) {
        const px = x(i), py = y(data[i]);
        i === 0 ? cx.moveTo(px, py) : cx.lineTo(px, py);
      }
      cx.strokeStyle = COLORS[field];
      cx.lineWidth = 1;
      cx.lineJoin = cx.lineCap = 'round';
      cx.stroke();

      // Dot at the latest sample.
      cx.beginPath();
      cx.arc(x(data.length - 1), y(data[data.length - 1]), 1.5, 0, Math.PI * 2);
      cx.fillStyle = COLORS[field];
      cx.fill();
    }

    setInterval(() => {
      const s = engine.state.smooth;
      for (const f of FIELDS) {
        document.getElementById('dr-' + f).textContent = fmt(s[f]);
        const v = s[f];
        if (typeof v === 'number' && Number.isFinite(v)) {
          const hist = sparkHist[f];
          hist.push(v);
          if (hist.length > SPARK_LEN) hist.shift();
        }
        drawSpark(f);
      }
    }, 250);
  </script>
</body>
</html>
